<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Galería del Orbsentista</title>
<style>
  :root{
    --bg:#0a0a0c;
    --card:#13131a;
    --text:#ffffff;
    --text-sec:#94a3b8;
    --accent:#4f46e5;
    --accent-hover:#6366f1;
    --border:#1f1f29;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  header{
    padding:28px 16px 18px;
    text-align:center;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  header h1{
    font-size:clamp(1rem, 4vw, 1.6rem);
    font-weight:900;
    font-family:'Georgia', 'Times New Roman', serif;
    width:100%;
    display:flex;
    justify-content:space-between;
    letter-spacing:normal;
  }
  header p{
    color:var(--text-sec);
    font-size:0.85rem;
    margin-top:4px;
  }
  .logo-wrap{
    margin-bottom:10px;
    display:flex;
    justify-content:center;
  }
  .logo-img{
    width:90px;
    height:64px;
    object-fit:cover;
    object-position:center;
    border-radius:8px;
    filter:brightness(0.9) contrast(1.1);
  }
  .subtitulo{
    font-family:'Palatino Linotype','Book Antiqua','Palatino',serif;
    font-style:normal;
    font-weight:400;
    font-size:0.88rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--text-sec);
    margin-top:2px;
  }
  .cruz{
    font-size:0.95rem;
    font-style:normal;
    color:#7c6fa0;
  }
  #adminToggleBtn{
    position:absolute;
    top:18px;
    right:16px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-sec);
    font-size:0.7rem;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
  }
  #adminToggleBtn:active{ background:var(--card); }

  main{
    max-width:1200px;
    margin:0 auto;
    padding:20px 16px 60px;
  }

  /* GRID PÚBLICA */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:18px;
  }
  .book-card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,0.35);
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    transition:transform .15s ease;
  }
  .book-card:active{ transform:scale(0.98); }
  .cover-wrap{
    width:100%;
    aspect-ratio:1/1.414;
    background:#1a1a22;
    overflow:hidden;
  }
  .cover-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .book-info{
    padding:14px 14px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex:1;
  }
  .book-title{
    font-size:1rem;
    font-weight:600;
    line-height:1.3;
  }
  .book-summary{
    font-size:0.82rem;
    color:var(--text-sec);
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .read-btn{
    margin-top:auto;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:9px;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    width:100%;
  }
  .read-btn:active{ background:var(--accent-hover); }

  .empty-msg{
    text-align:center;
    color:var(--text-sec);
    padding:60px 20px;
    font-size:0.9rem;
  }

  /* PANEL ADMIN */
  #adminPanel{
    display:none;
    max-width:600px;
    margin:0 auto 30px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
  }
  #adminPanel h2{
    font-size:1.1rem;
    margin-bottom:14px;
  }
  #adminPanel label{
    font-size:0.78rem;
    color:var(--text-sec);
    display:block;
    margin:10px 0 4px;
  }
  #adminPanel input{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#0e0e13;
    color:var(--text);
    font-size:0.85rem;
  }
  #adminPanel textarea{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#0e0e13;
    color:var(--text);
    font-size:0.85rem;
    resize:vertical;
    min-height:70px;
    font-family:inherit;
  }
  #publishBtn{
    margin-top:16px;
    width:100%;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:12px;
    border-radius:9px;
    font-weight:600;
    cursor:pointer;
  }
  #publishBtn:active{ background:var(--accent-hover); }

  .admin-list{
    margin-top:24px;
    border-top:1px solid var(--border);
    padding-top:16px;
  }
  .admin-list h3{
    font-size:0.9rem;
    color:var(--text-sec);
    margin-bottom:10px;
  }
  .admin-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--border);
    font-size:0.85rem;
  }
  .admin-row span{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .delete-btn{
    background:#7f1d1d;
    color:#fff;
    border:none;
    padding:7px 10px;
    border-radius:7px;
    font-size:0.75rem;
    cursor:pointer;
    flex-shrink:0;
  }
  .delete-btn:active{ background:#991b1b; }

  .login-box{
    display:flex;
    gap:8px;
    margin-bottom:6px;
  }
  .login-box input{ flex:1; }
  .login-box button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:0 16px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
  }

  /* MODAL LECTOR PDF */
  #pdfModal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:9999;
    flex-direction:column;
  }
  #pdfModal.active{ display:flex; }
  .modal-bar{
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  #backBtn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:9px 14px;
    border-radius:8px;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    flex-shrink:0;
  }
  #backBtn:active{ background:var(--accent-hover); }
  #modalTitle{
    font-size:0.95rem;
    font-weight:600;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .pdf-body{
    flex:1;
    width:100%;
    height:100%;
  }
  .pdf-body iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
  }
</style>
</head>

<main>

  <!-- PANEL ADMIN -->
  <div id="adminPanel">
    <div id="loginSection">
      <h2>Acceso administrador</h2>
      <div class="login-box">
        <input type="email" id="adminEmail" placeholder="Correo" autocomplete="username" style="margin-bottom:8px;">
      </div>
      <div class="login-box">
        <input type="password" id="adminPass" placeholder="Contraseña" autocomplete="current-password">
        <button id="loginBtn">Entrar</button>
      </div>
      <p id="loginError" style="color:#f87171;font-size:0.78rem;display:none;">Correo o contraseña incorrectos</p>
    </div>

    <div id="formSection" style="display:none;">
      <h2>Publicar nuevo libro</h2>
      <label>Título del libro</label>
      <input type="text" id="inputTitulo" placeholder="Ej: Meditaciones del Exadicto">

      <label>Resumen</label>
      <textarea id="inputResumen" placeholder="Resumen breve del libro..."></textarea>

      <label>Enlace de Google Drive (Portada / imagen)</label>
      <input type="text" id="inputPortada" placeholder="https://drive.google.com/file/d/.../view">

      <label>Enlace de Google Drive (PDF del libro)</label>
      <input type="text" id="inputPdf" placeholder="https://drive.google.com/file/d/.../view">

      <button id="publishBtn">Publicar</button>
      <button id="logoutBtn" style="margin-top:8px;width:100%;background:transparent;border:1px solid var(--border);color:var(--text-sec);padding:10px;border-radius:9px;cursor:pointer;">Cerrar sesión</button>

      <div class="admin-list">
        <h3>Libros publicados</h3>
        <div id="adminListContainer"></div>
      </div>
    </div>
  </div>

  <!-- GALERÍA PÚBLICA -->
  <div id="loadingMsg" class="empty-msg">Cargando galería...</div>
  <div id="gridContainer" class="grid"></div>
  <div id="emptyMsg" class="empty-msg" style="display:none;">Aún no hay libros publicados.</div>
  <div id="errorMsg" class="empty-msg" style="display:none;color:#f87171;">No se pudo cargar la galería. Revisa tu conexión e intenta de nuevo.</div>

</main>

<!-- MODAL LECTOR PDF -->
<div id="pdfModal">
  <div class="modal-bar">
    <button id="backBtn">← Volver a la galería</button>
    <div id="modalTitle"></div>
  </div>
  <div class="pdf-body" style="position:relative;">
    <div id="pdfLoading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-sec);font-size:0.85rem;">Cargando documento...</div>
    <iframe id="pdfFrame" src="" allow="fullscreen"></iframe>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    deleteDoc,
    doc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu5G0ylz3xvuEE0WlMDaA-ObJvBGrmB1Y",
    authDomain: "galeria-de-the-mad-e.firebaseapp.com",
    projectId: "galeria-de-the-mad-e",
    storageBucket: "galeria-de-the-mad-e.firebasestorage.app",
    messagingSenderId: "924190139870",
    appId: "1:924190139870:web:ec0e0d49aea163658be94f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const librosCol = collection(db, "libros");

  // ---------- Utilidad: extraer ID de Google Drive ----------
  function extraerIdDrive(url) {
    if (!url) return "";
    const patterns = [
      /\/d\/([a-zA-Z0-9_-]+)/,      // /d/ID/view
      /id=([a-zA-Z0-9_-]+)/         // ?id=ID
    ];
    for (const p of patterns) {
      const match = url.match(p);
      if (match && match[1]) return match[1];
    }
    return url.trim(); // si ya es un ID puro
  }

  function imagenDirecta(id) {
    return `https://lh3.googleusercontent.com/d/${id}=w800`;
  }

  // Alternativa oficial de Google Drive por si la anterior falla o tarda
  function imagenAlternativa(id) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
  }

  // ---------- ADMIN: login real con Firebase Authentication ----------
  // IMPORTANTE: esto YA NO usa una contraseña escrita en el código.
  // El acceso se valida contra Firebase Authentication, y las reglas de
  // Firestore (que debes configurar en la consola de Firebase) exigen
  // estar autenticado para poder publicar o borrar libros.
  let isAdmin = false;

  const adminToggleBtn = document.getElementById("adminToggleBtn");
  const adminPanel = document.getElementById("adminPanel");
  const loginSection = document.getElementById("loginSection");
  const formSection = document.getElementById("formSection");
  const loginBtn = document.getElementById("loginBtn");
  const adminEmail = document.getElementById("adminEmail");
  const adminPass = document.getElementById("adminPass");
  const loginError = document.getElementById("loginError");

  adminToggleBtn.addEventListener("click", () => {
    adminPanel.style.display = adminPanel.style.display === "block" ? "none" : "block";
  });

  loginBtn.addEventListener("click", async () => {
    loginError.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.textContent = "Entrando...";
    try {
      await signInWithEmailAndPassword(auth, adminEmail.value.trim(), adminPass.value);
      // onAuthStateChanged se encarga de mostrar el panel
    } catch (e) {
      loginError.textContent = "Correo o contraseña incorrectos";
      loginError.style.display = "block";
    }
    loginBtn.disabled = false;
    loginBtn.textContent = "Entrar";
  });

  // Detecta automáticamente si ya hay sesión iniciada (por ejemplo si
  // recargas la página después de haber entrado como admin)
  onAuthStateChanged(auth, (user) => {
    isAdmin = !!user;
    if (isAdmin) {
      loginSection.style.display = "none";
      formSection.style.display = "block";
    } else {
      loginSection.style.display = "block";
      formSection.style.display = "none";
    }
  });

  // ---------- Publicar libro ----------
  const publishBtn = document.getElementById("publishBtn");
  publishBtn.addEventListener("click", async () => {
    const titulo = document.getElementById("inputTitulo").value.trim();
    const resumen = document.getElementById("inputResumen").value.trim();
    const portadaUrl = document.getElementById("inputPortada").value.trim();
    const pdfUrl = document.getElementById("inputPdf").value.trim();

    if (!titulo || !resumen || !portadaUrl || !pdfUrl) {
      alert("Por favor completa todos los campos.");
      return;
    }

    const portadaId = extraerIdDrive(portadaUrl);
    const pdfId = extraerIdDrive(pdfUrl);

    publishBtn.disabled = true;
    publishBtn.textContent = "Publicando...";

    try {
      await addDoc(librosCol, {
        titulo,
        resumen,
        portadaId,
        pdfId,
        fecha: serverTimestamp()
      });

      document.getElementById("inputTitulo").value = "";
      document.getElementById("inputResumen").value = "";
      document.getElementById("inputPortada").value = "";
      document.getElementById("inputPdf").value = "";
    } catch (e) {
      alert("Error al publicar: " + e.message);
    }

    publishBtn.disabled = false;
    publishBtn.textContent = "Publicar";
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
  });

  // ---------- Escuchar Firestore en tiempo real ----------
  const gridContainer = document.getElementById("gridContainer");
  const emptyMsg = document.getElementById("emptyMsg");
  const loadingMsg = document.getElementById("loadingMsg");
  const errorMsg = document.getElementById("errorMsg");
  const adminListContainer = document.getElementById("adminListContainer");

  const q = query(librosCol, orderBy("fecha", "desc"));

  onSnapshot(q, (snapshot) => {
    loadingMsg.style.display = "none";
    errorMsg.style.display = "none";
    gridContainer.innerHTML = "";
    adminListContainer.innerHTML = "";

    if (snapshot.empty) {
      emptyMsg.style.display = "block";
      return;
    }
    emptyMsg.style.display = "none";

    snapshot.forEach((docSnap) => {
      const libro = docSnap.data();
      const id = docSnap.id;

      // --- Tarjeta pública ---
      const card = document.createElement("div");
      card.className = "book-card";
      card.innerHTML = `
        <div class="cover-wrap">
          <img src="${imagenDirecta(libro.portadaId)}" data-alt-src="${imagenAlternativa(libro.portadaId)}" data-tried-alt="0" alt="${escapeHtml(libro.titulo)}" loading="lazy" onerror="manejarErrorImagen(this)">
        </div>
        <div class="book-info">
          <div class="book-title">${escapeHtml(libro.titulo)}</div>
          <div class="book-summary">${escapeHtml(libro.resumen)}</div>
          <button class="read-btn">Leer en línea</button>
        </div>
      `;
      card.querySelector(".read-btn").addEventListener("click", () => {
        abrirLector(libro.titulo, libro.pdfId);
      });
      gridContainer.appendChild(card);

      // --- Fila en panel admin ---
      const row = document.createElement("div");
      row.className = "admin-row";
      row.innerHTML = `
        <span>${escapeHtml(libro.titulo)}</span>
        <button class="delete-btn">Eliminar publicación</button>
      `;
      row.querySelector(".delete-btn").addEventListener("click", async () => {
        if (confirm(`¿Eliminar "${libro.titulo}"?`)) {
          await deleteDoc(doc(db, "libros", id));
        }
      });
      adminListContainer.appendChild(row);
    });
  }, (error) => {
    // Esto se activa si, por ejemplo, las reglas de Firestore bloquean
    // la lectura, o si no hay conexión a internet.
    loadingMsg.style.display = "none";
    errorMsg.style.display = "block";
    console.error("Error al leer la galería:", error);
  });

  // Si la imagen principal de Drive falla, se intenta la alternativa una vez.
  // Si ambas fallan, se muestra un ícono de placeholder en vez de un espacio roto.
  window.manejarErrorImagen = function (img) {
    if (img.dataset.triedAlt === "0") {
      img.dataset.triedAlt = "1";
      img.src = img.dataset.altSrc;
    } else {
      img.onerror = null;
      img.src = "data:image/svg+xml;utf8," + encodeURIComponent(
        `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='566' viewBox='0 0 400 566'>
          <rect width='400' height='566' fill='#1a1a22'/>
          <text x='50%' y='50%' fill='#94a3b8' font-size='16' text-anchor='middle' font-family='sans-serif'>Portada no disponible</text>
        </svg>`
      );
    }
  };

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  // ---------- Modal lector PDF ----------
  const pdfModal = document.getElementById("pdfModal");
  const pdfFrame = document.getElementById("pdfFrame");
  const modalTitle = document.getElementById("modalTitle");
  const backBtn = document.getElementById("backBtn");
  const pdfLoading = document.getElementById("pdfLoading");

  function abrirLector(titulo, pdfId) {
    modalTitle.textContent = titulo;
    pdfLoading.style.display = "flex";
    pdfLoading.textContent = "Cargando documento...";
    // Se usa el visor oficial de Google Drive (/preview), más estable que gview.
    // Requiere que el archivo esté compartido como "Cualquier persona con el enlace".
    const viewerUrl = `https://drive.google.com/file/d/${pdfId}/preview`;
    pdfFrame.src = viewerUrl;
    pdfModal.classList.add("active");
    document.body.style.overflow = "hidden";

    // Si tarda demasiado en cargar (archivo privado, sin conexión, etc.),
    // avisamos al lector en vez de dejarlo viendo una pantalla en blanco.
    const avisoTimeout = setTimeout(() => {
      pdfLoading.textContent = "Esto está tardando más de lo normal. Intenta recargar la página.";
    }, 6000);
    pdfFrame.onload = () => {
      clearTimeout(avisoTimeout);
      pdfLoading.style.display = "none";
    };
  }

  function cerrarLector() {
    pdfModal.classList.remove("active");
    pdfFrame.src = "";
    document.body.style.overflow = "";
  }

  backBtn.addEventListener("click", cerrarLector);
</script>

</body>
</html>
